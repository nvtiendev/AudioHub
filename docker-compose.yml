services:
  audiohub-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  audiohub-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - audiohub-backend
